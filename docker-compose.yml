version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: rk-dodani-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rk-dodani_db
    ports:
      - '5440:5432'
    volumes:
      - agentarum_postgres_data:/var/lib/postgresql/data

volumes:
  agentarum_postgres_data: